services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_pgvector
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      PGVECTOR_CONNECTION: postgresql+psycopg://raguser:ragpass@postgres:5432/ragdb
    # Expose for debugging — change back to just 'expose: ["8000"]' later
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./rag-frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    depends_on:
      - app
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata: